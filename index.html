<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hyper Vault Node</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="page-login" class="page active">
        <div class="auth-center">
            <h1 class="neon-txt">VAULT_ACCESS</h1>
            <input type="text" id="login-u" placeholder="ADMIN_ID">
            <input type="password" id="login-p" placeholder="ACCESS_KEY">
            <button class="btn-glow" onclick="handleAuth()">INITIALIZE</button>
        </div>
    </div>

    <div id="page-files" class="page">
        <div class="nav-bar">
            <span class="logo" id="node-id">PROJECT_NODE</span>
            <button class="nav-btn" style="background:red;" onclick="location.reload()">EXIT</button>
        </div>
        
        <div class="content-scroll">
            <div class="admin-card">
                <input type="file" id="up" onchange="uploadFile(this)" style="display:none">
                <label for="up" class="btn-glow" style="display:block; text-align:center;">+ UPLOAD TO THIS NODE</label>
                <p id="status-text" style="font-size:10px; text-align:center; margin-top:8px; color:gray;">READY</p>
            </div>

            <h3 class="logo">📁 FILES_IN_THIS_NODE</h3>
            <div id="file-list"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
